# ======== DATABASE (POSTGRESQL) ========
# В облаке мы передадим полную строку через переменную, локально останется localhost
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxi_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:adm}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======== JPA / HIBERNATE ========
# Для продакшена выключаем лишний спам логов базы данных, но оставляем переменную
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ======== LOGGING (ЛОГИРОВАНИЕ) ========
# Системные логи фреймворка переводим на INFO, чтобы не забивать логи Google Cloud
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY:INFO}
logging.level.org.springframework.web=${LOGGING_LEVEL_SPRING_WEB:INFO}
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
# Логи твоего приложения оставляем в DEBUG, чтобы видеть твои контроллеры
logging.level.com.taxiapp=${LOGGING_LEVEL_TAXIAAPP:DEBUG}

# ======== SERVER CONFIG ========
# В облаке Cloud Run сам выдаст URL (передадим в SERVER_URL). ngrok остался как дефолт для локала.
app.server.url=${SERVER_URL:https://decorous-tempie-nonsubjugable.ngrok-free.dev}
# Cloud Run передает порт динамически в переменную PORT
server.port=${PORT:8080}
server.servlet.context-path=/

# ======== LIQPAY ========
liqpay.public-key=${LIQPAY_PUBLIC_KEY:sandbox_i35513204270}
liqpay.private-key=${LIQPAY_PRIVATE_KEY:sandbox_F92ENukhRWiPhwhAINXmQtAmfQInKOc5jMTvtnoj}

# ======== JWT (JSON Web Token) ========
jwt.secret=${JWT_SECRET:aVeryLongAndComplexSecretKeyForOurTaxiAppProjectThatIsSecure}
jwt.expiration=900000
jwt.refresh-expiration=31536000000

# ======== FILE STORAGE ========
file.upload-dir=${FILE_UPLOAD_DIR:./server-uploads}

# ======== FILE UPLOAD LIMITS (ЛИМИТЫ ЗАГРУЗКИ) ========
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=100MB

# ======== CORS & WEBSOCKET ========
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ======== GOOGLE AUTH ========
google.client-id=${GOOGLE_CLIENT_ID:359347918144-au70gopljkd5gnfheu3kjbhg96qcbek0.apps.googleusercontent.com}

# ======== REDIS CONFIG ========
# В облаке мы передадим IP-адрес из Memorystore Redis в эту переменную
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}